<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>StudyVault Lock</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#111827;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:sans-serif;
}

.box{
width:90%;
max-width:340px;
background:#1f2937;
padding:25px;
border-radius:18px;
text-align:center;
}

h2{
color:white;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
font-size:24px;
text-align:center;
letter-spacing:8px;
border:none;
border-radius:10px;
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#ff4d6d;
color:white;
font-size:18px;
}

</style>

</head>

<body>

<div class="box">

<h2>🔒 StudyVault</h2>

<input
id="pin"
type="password"
maxlength="4"
placeholder="****">

<button id="unlockBtn">
Unlock
</button>

</div>

<script src="lock.js" type="module"></script>

</body>
</html>
