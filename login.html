<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVault Login ❤️</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <!-- Floating Hearts -->
    <div class="hearts">
        <span>❤️</span>
        <span>💖</span>
        <span>💕</span>
        <span>💗</span>
        <span>💘</span>
    </div>

    <!-- Login Card -->
    <div class="login-card">

        <div class="logo">❤️</div>

        <h1>StudyVault</h1>

        <p class="quote" id="quote">
            Every message from you makes my day better. ❤️
        </p>

        <input
            type="email"
            id="email"
            placeholder="Enter your Email">

        <input
            type="password"
            id="password"
            placeholder="Enter your Password">

        <button id="loginBtn">
            Login ❤️
        </button>

        <button class="google-btn" id="googleBtn">
            Continue with Google
        </button>

        <br><br>

        <a href="index.html" style="color:#ffd6ea;text-decoration:none;">
            ← Back
        </a>

    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
